[alembic]
script_location = alembic
prepend_sys_path = .

# URL is overridden by env.py reading DATABASE_URL from environment.
# This placeholder keeps Alembic happy when env.py handles the URL.
sqlalchemy.url = postgresql://tracksense:tracksense@localhost:5432/tracksense

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S